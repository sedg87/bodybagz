<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyBagz | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    
</head>
<body>

    
    <div class="admin-container">


        <div class="admin-left">

            <section class="welcome">
                <img src="{{ config['ADMIN_AVATAR'] }}" alt="Craig's avatar" class="avatar">
                <h3>Welcome back, {{ config['ADMIN_NAME'] }}</h3>
                <p class="quote">"{{ quote }}"</p>
            </section>

            <section class="admin-links">
                <h2>Admin Actions</h2>
                <ul>
                    <li><a href="{{ url_for('admin') }}"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="{{ url_for('manage_posts') }}"><i class="fa-solid fa-note-sticky"></i> Manage Posts</a></li>
                    <li><a href="{{ url_for('add_post') }}"><i class="fa-solid fa-note-sticky"></i> Add Post</a></li>
                    <li><a href="{{ url_for('inbox') }}"><i class="fa-solid fa-envelope"></i> Inbox</a></li>
                    <li><a href="{{ url_for('manage_users') }}"><i class="fa-solid fa-user-gear"></i> Manage Users</a></li>
                    <li><a href="{{ url_for('my_favourites') }}"><i class="fa-solid fa-heart"></i> My Favourites</a></li>
                    <li><a href="{{ url_for('logout') }}"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
                </ul>
            </section>

        </div>

        <div class="admin-main">


            {% block content %}
            {% endblock %}

        </div>








    </div>

    

    

<script>
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
</script>
</body>
</html>
